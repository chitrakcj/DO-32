name: Manufacturing App CI/CD

on:
  push:
    branches: [ main ]  # Triggers when you push code to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Build using the unique GitHub SHA to version the image
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops_app:${{ github.sha }} .
          # Also tag it as 'latest' for the primary deployment
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/devops_app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/devops_app:latest
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops_app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops_app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user  # Default for Amazon Linux 2023
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            kubectl create secret generic gemini-secret --from-literal=API_KEY=$GOOGLE_API_KEY --dry-run=client -o yaml | kubectl apply -f -
            # Set the KUBECONFIG path for K3s
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            
            # Update the deployment to use the new image version
            # This triggers a rolling update in K3s
            kubectl set image deployment/manufacturing-app streamlit-app=${{ secrets.DOCKERHUB_USERNAME }}/devops_app:${{ github.sha }}
            
            # Check the status of the rollout
            kubectl rollout status deployment/manufacturing-app
