apiVersion: v1
kind: Service
metadata:
  name: manufacturing-service
spec:
  type: NodePort
  selector:
    app: manufacturing
  ports:
    - protocol: TCP
      port: 80          # The port the service listens on
      targetPort: 8501  # The port your Flask app runs on inside the container
      nodePort: 30001   # The port you will open in AWS Security Groups
